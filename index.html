<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&D Serviços e Manutenções | Especialistas em Instalações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(22, 22, 22, 0.9);
            --card-border: rgba(255, 204, 0, 0.15);
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --kd-yellow: #f1c40f;
            --whatsapp-green: #25d366;
            --instagram-pink: #e1306c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-color); background: var(--bg-color); line-height: 1.6; }

        header { background-color: #000; padding: 20px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: var(--kd-yellow); }

        .hero { padding: 40px 20px; text-align: center; }
        .hero h1 { font-size: 30px; margin-bottom: 20px; text-transform: uppercase; }
        .hero h1 span { color: var(--kd-yellow); }
        
        .hero-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; align-items: center; }
        .btn-social { display: inline-flex; align-items: center; gap: 12px; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 50px; font-weight: 700; width: 250px; justify-content: center; transition: 0.3s; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-2px); }

        .portfolio-section { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .category-block { background-color: var(--card-bg); border-radius: 14px; padding: 30px; margin-bottom: 40px; border: 1px solid var(--card-border); }
        .category-header { font-size: 20px; font-weight: 800; color: var(--kd-yellow); margin-bottom: 20px; border-left: 4px solid var(--kd-yellow); padding-left: 12px; }
        
        .image-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .grid-item { border-radius: 8px; overflow: hidden; aspect-ratio: 1 / 1; background: #151515; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .info-footer { background: #050505; padding: 40px 20px; border-top: 1px solid #1a1a1a; text-align: center; margin-top: 40px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; margin-bottom: 30px; color: var(--text-muted); }
        .copyright { color: #555; font-size: 13px; border-top: 1px solid #1a1a1a; padding-top: 20px; }

        @media (max-width: 768px) { .image-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">K&D <span>SERVIÇOS</span></div>

            <a href="https://instagram.com/kelvin_melo_oficial" class="btn-social" style="background:var(--instagram-pink)"><i class="fab fa-instagram"></i> Instagram</a>
        </div>
    </section>

                <div class="grid-item"><img src="https://ibb.co/7t8dWRcs" alt="Câmeras 3"></div>
                <div class="grid-item"><img src="https://ibb.co/Mkn3C3ZG" alt="Câmeras 4"></div>

                <div class="grid-item"><img src="https://ibb.co/3yKnspt1" alt="Elétrica 5"></div>

                <div class="grid-item"><img src="https://ibb.co/r21dnY1p" alt="Drywall 4"></div>
                <div class="grid-item"><img src="https://ibb.co/ycYyhQCV" alt="Drywall 5"></div>

            </div>
        </div>
    </main>

        <div class="copyright">&copy; 2026 K&D Serviços e Manutenções. Todos os direitos reservados.</div>

</body>
</html>
